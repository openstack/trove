# PostgreSQL jobs

- job:
    name: trove-tempest-ubuntu-base-postgresql18
    parent: trove-tempest-ubuntu-base
    irrelevant-files:
      - ^.*\.rst$
      - ^api-ref/.*$
      - ^doc/.*$
      - ^etc/.*$
      - ^releasenotes/.*$
      - ^test-requirements.txt$
      - ^tox.ini$
      - ^LICENSE$
      - ^contrib/
      - ^zuul\.d/
      - ^backup/
      - ^\..+
      - ^trove/guestagent/strategies/replication/
      - ^trove/guestagent/datastore/(mysql.*|mariadb)/.*$
    vars:
        devstack_localrc:
          TROVE_DATASTORE_TYPE: postgresql
          TROVE_DATASTORE_VERSION: 18
        devstack_local_conf:
          test-config:
            $TEMPEST_CONFIG:
              database:
                enabled_datastores: "postgresql"
                default_datastore_versions: postgresql:18


---
fixes:
  - |
    Backups (and therefore replica/clone bootstrap) used to fail with
    ``Cannot parse backup output`` whenever the API caller authenticated
    via an application credential. The ``trove-backup`` container was
    using ``keystoneauth1.identity.v3.Token`` with an explicit
    ``project_id`` when opening the Swift session, which forces Keystone
    to treat the request as a rescope. Keystone rejects rescope for
    tokens issued via application credentials with
    ``401 Application credentials cannot request a scope`` and the
    backup process exited before producing any parseable output. The
    forwarded ``context.auth_token`` is already scoped to the Trove
    project, so the scope parameters were redundant and have been
    dropped; backups now work for password, application-credential and
    trust-issued tokens alike.

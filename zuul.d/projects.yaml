---
- project:
    queue: trove
    templates:
      - check-requirements
      - openstack-cover-jobs
      - openstack-python3-jobs
      - openstack-python3-jobs-arm64
      - periodic-stable-jobs
      - publish-openstack-docs-pti
      - release-notes-jobs-python3
    check:
      # NOTE(tkajinam): Do not add version number for the primary version tests
      # because these are also used in trove-tempest-plugin. If two versions
      # need to be tested, add tests for the secondary version with explicit
      # version.
      jobs:
        - trove-tempest-ubuntu-base-mysql
        - trove-tempest-ubuntu-backup-mysql:
            voting: false
        - trove-tempest-ubuntu-replication-mysql:
            voting: false
        - trove-tempest-ubuntu-ssl-mysql
        - trove-tempest-ubuntu-ssl-replication-mysql:
            voting: false
        - trove-tempest-cinder-storage-driver-mysql:
           voting: false
        - trove-tempest-ubuntu-base-mariadb
        - trove-tempest-ubuntu-backup-mariadb:
            voting: false
        - trove-tempest-ubuntu-replication-mariadb:
            voting: false
        - trove-tempest-ubuntu-ssl-mariadb
        - trove-tempest-ubuntu-ssl-replication-mariadb:
            voting: false
        - trove-tempest-cinder-storage-driver-mariadb:
            voting: false
        - trove-tempest-ubuntu-base-postgresql
        - trove-tempest-ubuntu-backup-postgresql:
            voting: false
        - trove-tempest-ubuntu-ssl-postgresql
        - trove-tempest-ubuntu-ssl-replication-postgresql:
            voting: false
        - trove-tempest-ubuntu-replication-postgresql:
            voting: false
        - trove-tempest-cinder-storage-driver-postgresql:
            voting: false
        - trove-tox-bandit-baseline
        - trove-ubuntu-guest-image-build
    gate:
      jobs:
        - trove-tempest-ubuntu-base-mysql
        - trove-tempest-ubuntu-base-mariadb
        - trove-tempest-ubuntu-base-postgresql
    experimental:
      jobs:
        - trove-tempest-ipv6-only
    periodic:
      jobs:
        - publish-trove-guest-image-ubuntu-noble:
            branches:
                regex: master
        - publish-trove-images-quay:
            branches:
                regex: master

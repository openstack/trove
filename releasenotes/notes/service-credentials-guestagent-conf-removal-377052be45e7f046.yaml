---
features:
  - |
    Service credentials removal from trove-guestagent.conf.
    Trove guestagent no longer requires Keystone service credentials.
    Operators should remove this section from trove-guestagent.conf.
    Storing credentials on guest instances represents a security risk.
upgrade:
  - |
    Even after upgrading to this version, the existing guest-agent
    images will function normally alongside the existing backup images.
    However, to ensure compatibility with newly built guest images
    as well as the legacy ones, you must rebuild the backup images.
